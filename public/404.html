<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/#/" />
    <title>Redirecting…</title>
    <script>
      // Redirect any path to hash-based routing to avoid 404 on refresh
      (function () {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        if (!path.startsWith('/#/')) {
          l.replace('/#' + path);
        }
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
