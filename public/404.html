<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Single Page Apps for GitHub Pages
      // This script takes the current path and redirects to index.html while
      // preserving the pathname in a query string so the app can restore it.
      (function () {
        var l = window.location;
        var redirect = '/index.html?redirect=' + encodeURIComponent(l.pathname + l.search + l.hash);
        // Avoid infinite redirect loops
        if (!l.search.includes('redirect=')) {
          l.replace(redirect);
        }
      })();
    </script>
  </head>
  <body>
    Redirecting…
  </body>
</html>
